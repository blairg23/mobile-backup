[tox]
envlist = lint,type,coverage
skipsdist = true

[testenv]
skip_install = true
deps =
    pyyaml
    exifread
    Pillow
    tqdm

[testenv:lint]
deps =
    {[testenv]deps}
    black>=24,<25
    ruff>=0.6,<0.7
commands =
    black --check .
    ruff check .

[testenv:format]
deps =
    {[testenv:lint]deps}
commands =
    black .
    ruff check . --fix

[testenv:type]
deps =
    {[testenv]deps}
    mypy>=1.11,<2
    types-PyYAML>=6.0,<7
commands =
    mypy --ignore-missing-imports .

[testenv:coverage]
deps =
    {[testenv]deps}
    pytest>=8.0,<9
    pytest-cov>=6.0,<7
commands =
    pytest -q --cov=. --cov-branch --cov-report=term-missing --cov-report=xml {posargs:tests}
