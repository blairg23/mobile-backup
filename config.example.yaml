# --- LOCAL STAGING (drag from phone into here) ---
staging_root: "/path/to/Desktop/mobile"  # DCIM, Download/Downloads, Movies, Pictures

# Working directory for the rename step (Step 2 renames whatever lands here)
rename_tool_input: "/path/to/mobile-backup/input"

# Cloud destinations
dropbox_camera_uploads: "/path/to/Dropbox/Camera Uploads"
google_mobile_base: "/path/to/Google Drive/Multimedia/Pictures/Personal/Mobile"
# Optional: force destination folder name instead of auto {prev}_{curr} month span
destination_span_override: null  # e.g. "202601_202603"

# After renaming, stage here before the checker
desktop_mobile_camera: "/path/to/Desktop/mobile/DCIM/Camera"

# Controls
dry_run: true              # start safe; prints "would move/delete ..." lines
verbosity: 0              # 0=events only, 1=notes incl deleted-file details, 2=debug
write_run_summary_json: false  # true = write run_summary_{span}.json alongside the log
audit_detail_level: summary  # summary|deletions|actions
