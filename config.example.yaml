# --- LOCAL STAGING (drag from phone into here) ---
staging_root: "/mnt/c/Users/Neophile/Desktop/mobile"  # DCIM, Download/Downloads, Movies, Pictures

# Working directory for the rename step (Step 2 renames whatever lands here)
rename_tool_input: "/mnt/d/Dropbox/Projects/sandboxes/python/mobile-backup/input"

# Cloud destinations
dropbox_camera_uploads: "/mnt/d/Dropbox/Camera Uploads"
google_mobile_base: "/mnt/d/Google Drive/Multimedia/Pictures/Personal/Mobile"

# --- Destination span (which {span} folder files land in) ---
# prev_curr_month (default): auto {prev}_{curr} calendar month, e.g. "202509_202510"
# file_date_range: derive the span from the actual dates of files being processed --
#   use this for backfilling a batch that spans more than one month
# override: use destination_span_override verbatim
destination_span_mode: prev_curr_month
# Used only when destination_span_mode is "override"
destination_span_override: null  # e.g. "202601_202603"
# Used only when destination_span_mode is "file_date_range": which date to try first
# per file, before falling back through the other two (filename, mtime, exif)
destination_span_date_source: filename
# Used only when destination_span_mode is "file_date_range": what to do if more than
# half the files can't be dated by any source
destination_span_on_parse_failure: fallback_prev_curr  # fail|fallback_prev_curr

# After renaming, stage here before the checker
desktop_mobile_camera: "/mnt/c/Users/Neophile/Desktop/mobile/DCIM/Camera"

# Controls
dry_run: false
verbosity: 0              # 0=events only, 1=notes incl deleted-file details, 2=debug
write_run_summary_json: false  # true = write run_summary_{span}.json alongside the log
audit_detail_level: summary  # summary|deletions|actions
